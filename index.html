<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Catálogo Perfumes</title>

<style>
body{
  font-family: Arial;
  background:#0f0f0f;
  color:white;
  margin:0;
  padding:30px;
}

h1{
  text-align:center;
  margin-bottom:40px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:25px;
}

.card{
  background:#1c1c1c;
  padding:20px;
  border-radius:14px;
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  height:250px;
  object-fit:contain;
}

.precio{
  font-size:20px;
  font-weight:bold;
  margin-top:10px;
}

.stock{
  margin-top:8px;
  font-weight:bold;
}

.disponible{
  color:#00c853;
}

.sin-stock{
  color:#ff5252;
}

.boton{
  margin-top:15px;
  padding:10px;
  background:#c9a227;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

</style>
</head>
<body>

<h1>Catálogo</h1>

<div class="grid" id="productos"></div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSJTPrc-PTQwnfHx-GWsrqDRXIYCkZRkTJq9XkaytU8CscAJFelE91PXrV_UrOcA-DJym88oOlTJETQ/pub?gid=0&single=true&output=csv";

fetch(url)
.then(res => res.text())
.then(data => {

  const filas = data.split("\n").slice(1);

  filas.forEach(fila => {

    const columnas = fila.split(",");

    if(columnas.length < 6) return;

    const nombre = columnas[1];
    const precio = columnas[2];
    const stock = parseInt(columnas[3]);
    const imagen = columnas[4];

    const estadoStock = stock > 0
      ? `<div class="stock disponible">Disponible (${stock})</div>`
      : `<div class="stock sin-stock">Sin stock</div>`;

    const boton = stock > 0
      ? `<button class="boton" onclick="comprar('${nombre}', '${precio}')">Comprar</button>`
      : ``;

    document.getElementById("productos").innerHTML += `
      <div class="card">
        <img src="${imagen}">
        <h3>${nombre}</h3>
        <div class="precio">$${precio}</div>
        ${estadoStock}
        ${boton}
      </div>
    `;
  });

});

function comprar(nombre, precio){
  const mensaje = `Hola! Quiero comprar ${nombre} por $${precio}`;
  const telefono = "549XXXXXXXXXX"; // ← PONÉ TU NÚMERO
  const url = `https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`;
  window.open(url, "_blank");
}

</script>

</body>
</html>
